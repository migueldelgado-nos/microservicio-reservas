spring:
  application:
    name: reservas

  datasource:
    url: jdbc:mysql://localhost:3306/reservas_db
    username: root
    password:

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8082

  eureka:
    client:
      service-url:
        defaultZone: http://localhost:8761/eureka/